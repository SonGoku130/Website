    <h1>Animal Gallery</h1>

    <!--This is the slider part ;-;-->
    <div class="slider">
      <img id="slide" src="tiger.jpeg" width="400" height="300">
      <br><br>

      <button onclick="prev()">⬅</button>
      <button onclick="next()">➡</button>
    </div>

    <script>
      let images = ["lion.jpeg, tiger.jpeg"];
      let i = 0;

      function next() {
        i++;
        if (i > images.length) {
          i = 0;
        }
        document.getElementById("slide").src = images[i];
      }

      function prev() {
        i--;
        if (i < 0) {
          i = images.length - 1;
        }
        document.getElementById("slide.src") = images[i];
      }

      setInterval(next, 3000);
    </script>
  </body>
